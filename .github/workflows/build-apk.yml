name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-web:
    name: Build Web App
    runs-on: ubuntu-latest
    outputs:
      dist-artifact: dist
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist/
          retention-days: 1

  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: build-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download web dist
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: dist/

      - name: Install Capacitor CLI
        run: npm install -g @capacitor/cli

      - name: Install Capacitor dependencies
        run: |
          npm install @capacitor/core @capacitor/android

      - name: Init Capacitor (if not already done)
        run: |
          if [ ! -f "capacitor.config.ts" ] && [ ! -f "capacitor.config.json" ]; then
            npx cap init "DopamineBox" "com.dopaminebox.app" --web-dir=dist
          fi

      - name: Create capacitor.config.json if missing
        run: |
          if [ ! -f "capacitor.config.json" ] && [ ! -f "capacitor.config.ts" ]; then
            cat > capacitor.config.json << 'EOF'
          {
            "appId": "com.dopaminebox.app",
            "appName": "Dopamine Box",
            "webDir": "dist",
            "server": {
              "androidScheme": "https"
            },
            "android": {
              "allowMixedContent": true
            }
          }
          EOF
          fi

      - name: Add Android platform
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Copy web assets to Android
        run: npx cap copy android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Fix Kotlin version conflict
        working-directory: android
        run: |
          printf '\nkotlin.version=1.8.22\nandroid.useAndroidX=true\nandroid.enableJetifier=true\norg.gradle.jvmargs=-Xmx2048m\n' >> gradle.properties
          python3 - << 'PYEOF'
          import os
          build_gradle = 'build.gradle'
          with open(build_gradle, 'r') as f:
              content = f.read()
          if 'resolutionStrategy' not in content:
              patch = """
          subprojects {
              configurations.all {
                  resolutionStrategy {
                      force 'org.jetbrains.kotlin:kotlin-stdlib:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.8.22'
                      force 'org.jetbrains.kotlin:kotlin-stdlib-common:1.8.22'
                  }
              }
          }
          """
              with open(build_gradle, 'a') as f:
                  f.write(patch)
              print('resolutionStrategy block added.')
          else:
              print('resolutionStrategy already present, skipping.')
          PYEOF

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Clean build
        working-directory: android
        run: ./gradlew clean --no-daemon

      - name: Update Android version
        working-directory: android
        run: |
          VERSION_CODE=${{ github.run_number }}
          sed -i "s/versionCode [0-9]*/versionCode $VERSION_CODE/" app/build.gradle || true

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: dopamine-box-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create Release (on main push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "Dopamine Box Build #${{ github.run_number }}"
          body: |
            ## 🎰 Dopamine Box APK

            **Build:** #${{ github.run_number }}
            **Commit:** ${{ github.sha }}

            ### Install
            1. Download `app-debug.apk` below
            2. On your Android device: Settings → Security → Allow unknown sources
            3. Open the downloaded APK and install
            4. Launch **Dopamine Box** 🎰

            > Debug build — signed with default debug keystore
          files: android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
